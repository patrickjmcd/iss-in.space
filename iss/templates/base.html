<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>{% block title %}ISS-in.space &mdash; Pass Predictions{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Accurate ISS overhead pass predictions for visual observation and amateur radio">
    <meta name="keywords" content="ISS, international space station, passes, predictions, overhead, amateur radio">

    {% block meta %}
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ISS-in.space">
    <meta property="og:url" content="https://iss-in.space/">
    <meta property="og:title" content="ISS-in.space — Pass Predictions">
    <meta property="og:description" content="Find out when the International Space Station will fly over your location. Free JSON API included.">
    <meta property="og:image" content="https://iss-in.space/static/img/og-image.png">
    <!-- Twitter / iMessage -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ISS-in.space — Pass Predictions">
    <meta name="twitter:description" content="Find out when the International Space Station will fly over your location. Free JSON API included.">
    <meta name="twitter:image" content="https://iss-in.space/static/img/og-image.png">
    {% endblock %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap">
    <link rel="stylesheet" href="/static/css/tachyons.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Prevent flash of wrong theme -->
    <script>
        (function () {
            var t = localStorage.getItem('iss-theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    {% block extrahead %}{% endblock %}
</head>

<body class="min-vh-100 flex flex-column">
    <div class="pa3 pa4-ns mw8 center w-100 flex-auto">

        <header class="mb4 pb3 bb b--dark-gray flex items-center justify-between">
            <a href="/" class="no-underline dim flex items-baseline" style="color:inherit">
                <span class="f2 fw7 tracked-tight" style="color:var(--text-1)">ISS</span><span class="f2 fw4" style="color:var(--text-3)">-in.space</span>
            </a>
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

    </div>

    <footer class="pa3 pa4-ns mw8 center w-100 mt4" style="border-top:1px solid var(--border)">
        <p class="f7 mb0" style="color:var(--text-3)">
            By <a href="https://github.com/patrickjmcd" class="dim" style="color:var(--text-2)" target="_blank" rel="noopener">patrickjmcd</a>.
            Source on <a href="https://github.com/patrickjmcd/iss-in.space" class="dim" style="color:var(--text-2)" target="_blank" rel="noopener">GitHub</a>.
            TLE data from <a href="https://celestrak.org" class="dim" style="color:var(--text-2)" target="_blank" rel="noopener">Celestrak</a>.
        </p>
    </footer>

    <script>
        var DARK = 'dark', LIGHT = 'light';

        function getEffectiveTheme() {
            var saved = document.documentElement.getAttribute('data-theme');
            if (saved) return saved;
            return window.matchMedia('(prefers-color-scheme: light)').matches ? LIGHT : DARK;
        }

        function applyToggleLabel() {
            var btn = document.getElementById('theme-toggle');
            if (!btn) return;
            btn.textContent = getEffectiveTheme() === DARK ? '☀ light' : '◑ dark';
        }

        function toggleTheme() {
            var next = getEffectiveTheme() === DARK ? LIGHT : DARK;
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('iss-theme', next);
            applyToggleLabel();
        }

        applyToggleLabel();

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
            if (!localStorage.getItem('iss-theme')) applyToggleLabel();
        });
    </script>
</body>

</html>
